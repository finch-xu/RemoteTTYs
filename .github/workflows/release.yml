name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build-agent:
    name: Build Agent (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: macOS-arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            name: macOS-x64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            name: Linux-x64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            name: Linux-arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            name: Windows-x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          BUILD_NAME: ${{ matrix.name }}
        run: |
          cd agent
          VERSION="${GITHUB_REF#refs/tags/}"
          COMMIT="${GITHUB_SHA::8}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w -X main.Version=${VERSION} -X main.GitCommit=${COMMIT} -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "../rttys-agent-${BUILD_NAME}${EXT}" .

      - name: Import Apple certificate
        if: matrix.goos == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 -d > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Sign macOS binary
        if: matrix.goos == 'darwin'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          BINARY="rttys-agent-${{ matrix.name }}"
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "$BINARY"
          codesign --verify --verbose=2 "$BINARY"

      - name: Notarize macOS binary
        if: matrix.goos == 'darwin'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BINARY="rttys-agent-${{ matrix.name }}"
          zip "${BINARY}.zip" "$BINARY"
          xcrun notarytool submit "${BINARY}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 10m
          rm -f "${BINARY}.zip"

      - name: Clean up keychain
        if: matrix.goos == 'darwin' && always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rttys-agent-${{ matrix.name }}
          path: rttys-agent-${{ matrix.name }}*

  build-relay:
    name: Build Relay + Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: cd packages/relay && npx tsc
      - run: VITE_APP_VERSION="${GITHUB_REF#refs/tags/}" npx vite build
        working-directory: packages/web
      - run: cp -r packages/web/dist packages/relay/public
      - name: Package relay
        run: tar -czf rttys-relay.tar.gz -C packages/relay dist public package.json
      - uses: actions/upload-artifact@v4
        with:
          name: rttys-relay
          path: rttys-relay.tar.gz

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            RTTYS_VERSION=${{ steps.version.outputs.tag }}
            RTTYS_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/remotettys:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/remotettys:latest

  release:
    name: Create Release
    needs: [build-agent, build-relay]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rttys-*
          merge-multiple: false
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rttys-agent-*/rttys-agent-*
            artifacts/rttys-relay/rttys-relay.tar.gz
          generate_release_notes: true
