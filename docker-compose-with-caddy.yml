services:
  relay:
    build: .
    expose:
      - "8080"
    volumes:
      - rttys-data:/app/data
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - relay
    restart: unless-stopped

volumes:
  rttys-data:
  caddy-data:
  caddy-config:
